<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Eid Greeting Generator By Diyala Alturki</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">

    <style>
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            color: white;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            background: linear-gradient(270deg, #068fb1, #51aee0, #018ea0);
            background-size: 600% 600%;
            animation: gradientMove 15s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        .hide-btn {
            opacity: 0 !important;
            pointer-events: none !important;
            transform: scale(0.8) !important;
            transition: all 0.5s ease;
            display: none !important;
        }

        .color-circle {
            position: absolute;
            width: 25px; 
            height: 25px;
            border-radius: 50%; 
            opacity: 0.4; 
            pointer-events: none;
            z-index: 0;
            animation: circleTwinkle 3s infinite alternate;
        }

        @keyframes circleTwinkle {
            from { opacity: 0.3; transform: scale(0.8); }
            to { opacity: 0.6; transform: scale(1.1); }
        }

        #main-content { z-index: 10; max-width: 800px; width: 90%; }

        .title-ar { font-family: 'Reem Kufi', sans-serif; font-size: 42px; direction: rtl; margin-bottom: 5px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .title-en { font-size: 19px; margin-bottom: 35px; opacity: 0.8; letter-spacing: 1.5px; text-transform: uppercase; }

        button#main-btn {
            padding: 18px 35px;
            font-size: 18px;
            font-family: 'Reem Kufi', sans-serif; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            color: #ffffff; 
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            outline: none;
            line-height: 1.6;
        }

        button#main-btn:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        button#main-btn:active { transform: translateY(-2px) scale(1.02); }

        .copy-btn {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            outline: none;
            animation: pulseBtn 2s infinite;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            border-color: white;
            transform: scale(1.05);
        }

        @keyframes pulseBtn { 
            0% {box-shadow:0 0 0 0 rgba(255,255,255,0.3);} 
            70% {box-shadow:0 0 0 10px rgba(255,255,255,0);} 
            100% {box-shadow:0 0 0 0 rgba(255,255,255,0);} 
        }

        #envelope-wrapper {
            margin-top: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            perspective: 1000px;
        }

        .envelope {
            width: 100%; height: 300px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); border-radius: 20px 20px 10px 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            overflow: hidden;
            transform-origin: bottom center;
        }

        .envelope::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.15);
            clip-path: polygon(0 0, 50% 50%, 100% 0); 
            transform-origin: top center; transition: transform 0.8s ease-in-out;
            border-bottom: 2px solid rgba(255, 215, 0, 0.4);
        }

        #greeting-container {
            position: absolute;
            top: 5px;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;    
            padding: 20px;
            box-sizing: border-box; 
  
            transform: translateY(0) scale(0.9);
            opacity: 0;
            transition: all 0.8s ease-out;
            z-index: 2; 
        }

        @keyframes riseAndOpen {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            40% { transform: translateY(0) scale(1); opacity: 1; } 
            60% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-5px) scale(1.02); } 
        }

        .show-envelope { display: flex !important; animation: riseAndOpen 1.8s ease-out forwards; }
        .open-flap::before { transform: rotateX(-180deg); z-index: -1; } 
        .reveal-greeting { transform: translateY(0%) scale(1) !important; opacity: 1 !important; bottom: 60px !important; }


        .ar { font-family: 'Amiri', serif; font-size: 28px; direction: rtl; margin-bottom: 15px; line-height: 1.5; color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .en { font-size: 19px; line-height: 1.4; opacity: 0.9; color: #f0e6ff; }

        .footer-credit {
            position: fixed;
            bottom: 15px;
            left: 0;
            width: 100%;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            z-index: 20;
        }

        .social-links { margin-top: 10px; }
        .social-links a { color: white; margin: 0 12px; text-decoration: none; opacity: 0.7; transition: all 0.3s ease; font-size: 25px; display: inline-block; }
        .social-links a:hover { opacity: 1; color: rgb(255, 255, 255); transform: translateY(-3px); }

        @media (max-width: 600px) {

            body { padding: 10px; justify-content: flex-start; padding-top: 15vh; }

            .title-ar { font-size: 32px; } 
            .title-en { font-size: 15px; margin-bottom: 20px; }
            
            button#main-btn { width: 85%; font-size: 17px; padding: 15px; }
            .copy-btn { margin-top: 12px; padding: 6px 15px; font-size: 11px; border-radius: 8px; }
            
            #envelope-wrapper { margin-top: 20px; width: 95%; }     
            .envelope { height: 250px; }

            .ar { font-size: 19px; line-height: 1.4; }
            .en { font-size: 13px; }

            .footer-credit { font-size: 11px; bottom: 10px; background: rgba(0,0,0,0.1); padding: 5px 0;}
            .social-links a { font-size: 22px; margin: 0 10px; }
        }

    </style>
</head>
<body>

<div id="main-content">
    <div class="title-ar">لنشارك فرحة العيد معاً</div>
    <div class="title-en">Let’s share the joy of Eid together</div>

    <button id="main-btn" onclick="startGreetingSequence()">
        اضغط للحصول على تهنئتك <br>
        Click for your greeting
    </button>

    <div id="envelope-wrapper">
        <div class="envelope" id="envelope-body">
            <div id="greeting-container">
                <div id="greeting"></div>
                <button class="copy-btn" id="copy-btn" onclick="copyGreeting()">
                    <i class="far fa-copy"></i> نسخ التهنئة | Copy Text
                </button>
            </div>
        </div>
    </div>
</div>

<footer class="footer-credit">
    <div>Developed by Diyala Alturki | تم التطوير بواسطة ديالى التركي</div>
    <div class="social-links">
        <a href="https://www.linkedin.com/in/diyala-alturki" target="_blank">
            <i class="fab fa-linkedin"></i>
        </a>
        <a href="https://github.com/Diiiyala" target="_blank">
            <i class="fab fa-github"></i>
        </a>
        <a href="mailto:diyala.alturki@gmail.com">
            <i class="fas fa-envelope"></i>
        </a>
    </div>
</footer>

<script>
const greetings = [
    { ar:"أدام الله عليكم الأعياد دهورًا، وألبسكم من تقواه نورًا، عيدكم مبارك.", en:"May Allah grant you many years of Eids and clothe you with the light of His piety. Blessed Eid to you."},
    { ar:"كل عام وأنتم بألف خير، وعيد فطر مبارك، أسأل الله أن يعيده علينا وعليكم باليمن والبركات.", en:"Wishing you goodness every year. Blessed Eid al-Fitr. May Allah bring it back to us and to you with prosperity and blessings." },
    { ar:"عيد فطر مبارك، أسأل الله أن يملأ أيامكم فرحًا وسرورًا، وأن يتقبل منكم الصيام والقيام، ويجعل حياتكم كلها أعيادًا بالطاعة والرضا.", en:"Blessed Eid al-Fitr. I ask Allah to fill your days with joy and happiness, accept your fasting and prayers, and make your life full of blessed moments in His obedience and contentment." },
    { ar:"أهنئكم بحلول عيد الفطر المبارك، وأسأل الله أن يكتب لكم فيه الفرح والطمأنينة، وأن يتقبل أعمالكم ويحقق لكم كل ما تتمنون.", en:"I congratulate you on the blessed Eid al-Fitr. May Allah grant you joy and peace in it, accept your deeds, and fulfill all that you wish for." },
    { ar:"عيدكم مبارك، جعل الله أيامكم أفراحًا، ورزقكم من الخير ما يملأ حياتكم بركة وسعادة.", en:"Blessed Eid. May Allah make your days full of joy and grant you goodness that fills your life with blessings and happiness." },
    { ar:"عيدكم سعيد ومبارك، أسأل الله أن يتقبل طاعاتكم، ويجعل الفرح يسكن قلوبكم، وأن يكتب لكم الخير في كل خطوة.", en:"Happy and blessed Eid. May Allah accept your acts of worship, fill your hearts with joy, and write goodness for you in every step." },
    { ar:"كل عام وأنتم بخير بمناسبة عيد الفطر، جعل الله هذا العيد فاتحة خير عليكم، وملأ قلوبكم راحة وسرورًا، وتقبل منكم صالح الأعمال.", en:"Wishing you well every year on the occasion of Eid al-Fitr. May this Eid be the beginning of goodness for you, fill your hearts with peace and joy, and accept your righteous deeds." },
    { ar:"مع قدوم العيد أبعث لكم أصدق التهاني، وأسأل الله أن يجعل أيامكم أفراحًا متواصلة، وأن يرزقكم الرضا والسعادة.", en:"With the arrival of Eid, I send you my sincere congratulations. May Allah make your days full of continuous joy and grant you contentment and happiness." },
    { ar:"عيدكم مبارك، جعل الله هذا العيد بداية خير لكم، وملأ حياتكم نورًا وبركة وراحة بال.", en:"Blessed Eid. May Allah make this Eid the beginning of goodness for you and fill your life with light, blessings, and peace of mind." }
];

    let lastIndex = -1; 
    const greetingDelay = 1800;

    function startGreetingSequence() {

        const btn = document.getElementById("main-btn");
        btn.classList.add("hide-btn");

        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#ffffff', '#ffd700', '#7b3fe4'] });
        const wrapper = document.getElementById("envelope-wrapper");
        const body = document.getElementById("envelope-body");
        const container = document.getElementById("greeting-container");
        const display = document.getElementById("greeting");
        wrapper.classList.remove("show-envelope", "open-flap", "reveal-greeting");
        wrapper.style.display = "flex";
        wrapper.classList.add("show-envelope");

        setTimeout(() => body.classList.add("open-flap"), 1200);
        setTimeout(() => {
            let randomIndex;
            do { randomIndex = Math.floor(Math.random() * greetings.length); } while (randomIndex === lastIndex); 
            lastIndex = randomIndex; 
            display.innerHTML = `<div class='ar'>${greetings[randomIndex].ar}</div><div class='en'>${greetings[randomIndex].en}</div>`;
            container.classList.add("reveal-greeting");
        }, greetingDelay);
    }

    function copyGreeting() {
        navigator.clipboard.writeText(document.getElementById("greeting").innerText).then(() => {
            const btn = document.getElementById("copy-btn");
            btn.innerHTML = "<i class='fas fa-check'></i> تم النسخ! ✅";
            setTimeout(() => { btn.innerHTML = "<i class='far fa-copy'></i> نسخ التهنئة | Copy Text"; }, 2000);
        });
    }

    const colors = ['#ff74c1', '#fdfdfd', '#ffeaa7', '#a29bfe', '#55efc4', '#fffa65'];

    for (let i = 0; i < 80; i++) {
        let circle = document.createElement("div");
        circle.className = "color-circle";
        circle.style.top = Math.random() * 100 + "vh";
        circle.style.left = Math.random() * 100 + "vw";
        circle.style.background = colors[Math.floor(Math.random() * colors.length)];
        circle.style.animationDelay = Math.random() * 5 + "s";

        document.body.appendChild(circle);
    }

</script>
</body>
</html>
